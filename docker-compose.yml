services:
  neo4j:
    image: neo4j:latest
    container_name: evidence-graph-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/password
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: evidence-graph-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        /bin/ollama serve &
        sleep 5
        /bin/ollama pull llama3.2
        wait

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: evidence-graph-app
    ports:
      - "8501:8501"
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password
      - OLLAMA_HOST=http://ollama:11434
      - EXTRACTION_MODEL=llama3.2
      - ANSWER_MODEL=llama3.2
    depends_on:
      neo4j:
        condition: service_healthy
      ollama:
        condition: service_started

volumes:
  neo4j_data:
  ollama_data:
